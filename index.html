<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Store</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #111;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid #222;
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            background: #222;
        }

        .card h3 {
            font-size: 14px;
            margin: 10px 0 5px;
        }

        .card p {
            font-size: 10px;
            color: #888;
            margin-bottom: 10px;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .navbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            width: 85%;
            height: 65px;
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .nav-item {
            color: #000;
            text-decoration: none;
            font-size: 10px;
            text-align: center;
        }

        .nav-icon {
            font-size: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Icon Store</h1>
        <span>🌙</span>
    </header>

    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Pack">
            <h3>One líquid</h3>
            <p>Premium Pack</p>
            <button class="btn">Ver</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Pack">
            <h3>iTinted</h3>
            <p>Style iOS</p>
            <button class="btn">Ver</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Pack">
            <h3>Aura</h3>
            <p>Gradient</p>
            <button class="btn">Ver</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Pack">
            <h3>Pure</h3>
            <p>Minimalist</p>
            <button class="btn">Ver</button>
        </div>
    </div>

    <nav class="navbar">
        <a href="#" class="nav-item"><span class="nav-icon">🏠</span>Inicio</a>
        <a href="#" class="nav-item"><span class="nav-icon">🎨</span>Iconos</a>
        <a href="#" class="nav-item"><span class="nav-icon">📱</span>Widgets</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>Perfil</a>
    </nav>

</body>
</html>
